name: employment-contract.lawyer
language: pl
document_type: umowa o pracę
reviewer_role: asystent prawny
review_pipeline:
  - sentence
  - paragraph
  - section
  - document
action_policy:
  apply_policy:
    typo: apply
    grammar: apply
    formatting: apply
    unclear_sentence: suggest
    risky_clause: human_decision
    missing_clause: human_decision
    legal_rewrite: human_decision
  allowed_action_types_for_auto_apply:
    - replace
    - delete
    - insert_before
    - insert_after
  block_when_requires_human_decision: true
  require_llm_apply_hint: true
  min_confidence_for_auto_apply: 0.8
  max_severity_for_auto_apply: medium
  protected_patterns:
    - name: posejdon_placeholder
      pattern: "\\[[A-Z_]+_\\d+\\]"
      preserve: true
action_policies:
  umowa o pracę:
    blocked_categories:
      - legal_rewrite
    max_severity_for_auto_apply: medium
outputs:
  reviewed_docx: true
  corrected_docx: true
